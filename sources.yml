# Data Source Provenance for OT Security MCP
# Lists all authoritative data sources, update mechanisms, and currency.
#
# All sources below are commercial-allowed per the Ansvar 100%-commercial-use-legal
# floor (CLAUDE.md "Floor rule") and ADR-030 GREEN posture. ISA/IEC 62443 and
# ISA-95 (Purdue) were removed 2026-05-14 because their upstream terms forbid
# bulk redistribution — see at-risk-mcps.yml + companion arch-docs commit.

version: 2
last_updated: '2026-05-14'

sources:
  - id: nist-800-53
    name: "NIST SP 800-53 Rev 5"
    publisher: csrc.nist.gov
    type: primary
    url: "https://github.com/usnistgov/oscal-content/tree/main/nist.gov/SP800-53/rev5"
    upstream_data_url: "https://csrc.nist.gov/pubs/sp/800/53/r5/final"
    format: OSCAL JSON
    update_mechanism: automated
    update_frequency: "Daily check via GitHub Actions"
    ingestion_script: "scripts/ingest-nist-80053.ts"
    license: Public-Domain
    commercial_allowed: true
    verified_at: '2026-05-14'
    terms_url: "https://www.nist.gov/director/licensing"
    coverage: "260 OT-relevant controls from 15 families"
    notes: >-
      NIST licensing page (verbatim): "Works authored by NIST employees are not
      subject to Copyright protection within the United States; foreign rights
      are reserved." US-federal-government work under 17 U.S.C. §105 — public
      domain, commercial redistribution permitted.

  - id: nist-800-82
    name: "NIST SP 800-82 Rev 3"
    publisher: csrc.nist.gov
    type: primary
    url: "https://csrc.nist.gov/pubs/sp/800/82/r3/final"
    upstream_data_url: "https://csrc.nist.gov/pubs/sp/800/82/r3/final"
    format: "Curated JSON from official PDF"
    update_mechanism: manual
    update_frequency: "On new NIST revision"
    ingestion_script: "scripts/ingest-nist-80082.ts"
    license: Public-Domain
    commercial_allowed: true
    verified_at: '2026-05-14'
    terms_url: "https://www.nist.gov/director/licensing"
    coverage: "16 curated guidance sections"
    notes: >-
      NIST licensing page (verbatim): "Works authored by NIST employees are not
      subject to Copyright protection within the United States; foreign rights
      are reserved." Same US-federal-PD basis as nist-800-53.

  - id: mitre-attack-ics
    name: "MITRE ATT&CK for ICS"
    publisher: attack.mitre.org
    type: primary
    url: "https://github.com/mitre-attack/attack-stix-data/tree/master/ics-attack"
    upstream_data_url: "https://attack.mitre.org/matrices/ics/"
    format: STIX 2.0 JSON
    update_mechanism: automated
    update_frequency: "Daily check via GitHub Actions"
    ingestion_script: "scripts/ingest-mitre-ics.ts"
    license: Apache-2.0
    commercial_allowed: true
    verified_at: '2026-05-14'
    terms_url: "https://attack.mitre.org/resources/legal-and-branding/terms-of-use/"
    coverage: "83 techniques, 52 mitigations, 331 relationships"
    notes: >-
      MITRE ATT&CK terms of use (verbatim): "The MITRE Corporation (MITRE)
      hereby grants you a non-exclusive, royalty-free license to use ATT&CK®
      for research, development, and commercial purposes." Attribution
      required: "© 2026 The MITRE Corporation. This work is reproduced and
      distributed with the permission of The MITRE Corporation." Mapped to
      Apache-2.0 in attribution-licenses.json (permissive + attribution
      required, no share-alike) — functionally equivalent for our purposes.

  - id: cross-standard-mappings
    name: "MITRE ATT&CK ICS to NIST 800-53 Mitigation Linkages"
    publisher: attack.mitre.org
    type: curated
    url: "https://attack.mitre.org/resources/legal-and-branding/terms-of-use/"
    upstream_data_url: "https://attack.mitre.org/matrices/ics/"
    format: JSON
    update_mechanism: manual
    update_frequency: "On upstream revisions"
    ingestion_script: "scripts/ingest-cross-mappings.ts"
    license: Apache-2.0
    commercial_allowed: true
    verified_at: '2026-05-14'
    terms_url: "https://attack.mitre.org/resources/legal-and-branding/terms-of-use/"
    coverage: "88 MITRE-NIST cross-mappings"
    notes: >-
      Ansvar-curated mapping table derived from MITRE ATT&CK ICS mitigations
      and NIST SP 800-53 Rev 5 control catalog. Both upstream sources are
      commercial-allowed (MITRE ATT&CK License + US-federal public domain).
      The earlier ISA/IEC-derived half of the mapping table was removed
      2026-05-14 — see file header for context.
