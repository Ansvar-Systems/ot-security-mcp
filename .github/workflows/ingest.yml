name: Scheduled Data Ingestion

on:
  schedule:
    # Run daily at 03:00 UTC (after upstream sources typically update)
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      source:
        description: 'Data source to ingest (mitre, nist-800-53, all)'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - mitre
          - nist-800-53

jobs:
  ingest:
    name: Ingest Updated Data Sources
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Ingest MITRE ATT&CK for ICS
        if: ${{ inputs.source == 'all' || inputs.source == 'mitre' || github.event_name == 'schedule' }}
        run: |
          echo "Ingesting MITRE ATT&CK for ICS..."
          npm run ingest:mitre
          echo "MITRE ingestion complete"

      - name: Ingest NIST 800-53 (OSCAL)
        if: ${{ inputs.source == 'all' || inputs.source == 'nist-800-53' || github.event_name == 'schedule' }}
        run: |
          echo "Ingesting NIST SP 800-53 from OSCAL..."
          npm run ingest:nist-80053
          echo "NIST 800-53 ingestion complete"

      - name: Verify data integrity
        run: |
          npm run verify:integrity

      - name: Run test suite
        run: npm test

      - name: Update freshness timestamp in coverage.json
        run: |
          node -e "
            const fs = require('fs');
            const path = 'data/coverage.json';
            if (fs.existsSync(path)) {
              const data = JSON.parse(fs.readFileSync(path, 'utf8'));
              const now = new Date().toISOString();
              if ('${{ inputs.source }}' === 'all' || '${{ inputs.source }}' === 'mitre' || '${{ github.event_name }}' === 'schedule') {
                data.sources['mitre-ics'] = data.sources['mitre-ics'] || {};
                data.sources['mitre-ics'].last_ingested = now;
              }
              if ('${{ inputs.source }}' === 'all' || '${{ inputs.source }}' === 'nist-800-53' || '${{ github.event_name }}' === 'schedule') {
                data.sources['nist-800-53'] = data.sources['nist-800-53'] || {};
                data.sources['nist-800-53'].last_ingested = now;
              }
              data.last_updated = now;
              fs.writeFileSync(path, JSON.stringify(data, null, 2));
              console.log('Updated coverage.json timestamps');
            }
          "

      - name: Check for data changes
        id: changes
        run: |
          if git diff --quiet data/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No data changes detected"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Data changes detected"
            git diff --stat data/
          fi

      - name: Create Pull Request for data updates
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore(data): automated ingestion update'
          title: 'chore(data): automated data source update'
          body: |
            ## Automated Data Ingestion

            This PR contains updated data from automated ingestion of OT security data sources.

            ### Sources Updated
            - MITRE ATT&CK for ICS (from STIX 2.0 GitHub)
            - NIST SP 800-53 (from OSCAL GitHub)

            ### Verification
            - Data integrity check passed
            - Full test suite passed

            > Generated by the `ingest` workflow at ${{ github.run_id }}
          branch: chore/automated-data-update
          base: dev
          labels: automated,data-update
